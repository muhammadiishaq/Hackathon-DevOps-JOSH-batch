name: Kubernetes CD

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy-to-k8s:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify Kubernetes Cluster
        run: |
          kubectl get nodes

      - name: Update Backend Image
        run: |
          sed -i "s|image: .*skillpulse-backend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.event.workflow_run.head_sha }}|g" k8s/20-backend.yaml

      - name: Update Frontend Image
        run: |
          sed -i "s|image: .*skillpulse-frontend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.event.workflow_run.head_sha }}|g" k8s/30-frontend.yaml

      - name: Deploy Namespace
        run: |
          kubectl apply -f k8s/00-namespace.yaml

      - name: Deploy MySQL
        run: |
          kubectl apply -f k8s/10-mysql.yaml

      - name: Deploy Backend
        run: |
          kubectl apply -f k8s/20-backend.yaml

      - name: Deploy Frontend
        run: |
          kubectl apply -f k8s/30-frontend.yaml

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment backend -n skillpulse
          kubectl rollout restart deployment frontend -n skillpulse

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/backend -n skillpulse
          kubectl rollout status deployment/frontend -n skillpulse

      - name: Get Pods
        run: |
          kubectl get pods -n skillpulse
